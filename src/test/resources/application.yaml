spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  mail:
    host: localhost
    port: 1025
    username: test
    password: test
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  ssl:
    enabled: false

app:
  mail:
    enabled: false
  jwt:
    private-key: classpath:test-keys/private.pem
    public-key: classpath:test-keys/public.pem
  minio:
    endpoint: http://localhost:9000
    public-endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: tinterest-images
